name: steblik

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-steblik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-steblik}
      POSTGRES_DB: ${POSTGRES_DB:-steblik}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steblik}"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  db-data:
