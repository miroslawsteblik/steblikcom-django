
# pre-commit install
# pre-commit autoupdate
# pre-commit run --all-files


repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args:
          - -c
          - pyproject.toml
          - r
        exclude: .venv

  # Gitleaks — catches secrets, API keys, passwords, tokens
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: privacy-invariants
        name: Privacy invariants
        entry: ./scripts/check_privacy_invariants.sh
        language: system
        pass_filenames: false
        always_run: true
