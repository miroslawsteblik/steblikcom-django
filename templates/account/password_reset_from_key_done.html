{% extends "base.html" %}
{% block title %}Password updated — {{ site_meta.name }}{% endblock %}
{% block banner %}{% endblock %}
{% block content %}
  <div class="auth-card auth-card--info">
    <div class="paywall-icon">✅</div>
    <h1 class="auth-title">Password updated</h1>
    <p class="auth-subtitle">Your password has been changed. You can now log in.</p>
    <a href="{% url 'account_login' %}" class="btn-primary btn-full">Log in</a>
  </div>
{% endblock %}
